name: Mettre à jour Textes à la pelle

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Récupérer les annonces
        run: node scripts/fetch-textes-a-la-pelle.mjs

      - name: Committer si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/textes-a-la-pelle.json
          if git diff --staged --quiet; then
            echo "Aucun changement."
          else
            git commit -m "chore: mise à jour des annonces Textes à la pelle"
            git push
          fi
