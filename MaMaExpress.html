<!DOCTYPE html>
<!-- MaMaExpress : structure HTML uniquement — logique dans js/MaMaExpress.js, styles dans css/MaMaExpress.css -->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaMaExpress - Association MaMaMa</title>
    <link rel="stylesheet" href="css/MaMaStyle.css">
    <link rel="stylesheet" href="css/MaMaExpress.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="container">
        <div class="header-container">
            <img src="images/mamama_logo.webp" alt="Association MaMaMa">
            <h1>MaMaExpress</h1>
        </div>
        
        <div id="topSection" class="top-section">
            <div class="input-section">
                <div class="address-input">
                    <h3>Sélectionner les adresses à livrer</h3>
                    <div class="pmi-controls">
                        <input type="text" id="searchPmi" placeholder="Rechercher une PMI..." class="search-input">
                        <div class="select-buttons">
                            <button id="selectAll" class="select-button">Tout sélectionner</button>
                            <button id="deselectAll" class="select-button">Tout désélectionner</button>
                        </div>
                    </div>
                    <div id="pmiList" class="pmi-list">
                        <p style="color: #666;">Chargement des données...</p>
                    </div>
                    <div class="custom-address-section">
                        <h4>
                            <span class="custom-address-icon">📍</span>
                            Ajouter une adresse personnalisée
                        </h4>
                        <div class="custom-address-input-group">
                            <input type="text" id="customAddress" placeholder="Entrez une adresse (ex: 10 rue de la Paix, Paris)">
                            <button id="calculateCustomAddress" class="select-button">Calculer</button>
                        </div>
                        <div id="customAddressStatus"></div>
                        <div id="customAddressesList">
                            <div class="custom-addresses-title">Adresses personnalisées ajoutées :</div>
                            <div id="customAddressesItems"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="results" class="results-section">
                <div id="routesListContainer" class="routes-list">
                    <div class="routes-header">
                        <div class="routes-print-banner">
                            <img src="images/mamama_logo.webp" alt="Association MaMaMa" class="routes-print-logo" width="160" height="80">
                            <h2 id="routesPrintHeading" class="routes-print-title">Itinéraire Optimisé du</h2>
                        </div>
                        <h3 class="routes-screen-title">Itinéraire optimisé</h3>
                        <div id="googleMapsButton"></div>
                    </div>
                    <div id="routes"></div>
                    <div class="routes-print-footer">
                        <button type="button" id="printItineraryBtn" class="print-itinerary-btn">Imprimer l'itinéraire</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="mapContainer"></div>
    </div>
    <div class="footer">
        Pour toute idée d'amélioration, contactez Natacha : <a href="mailto:digital@asso-mamama.fr">digital@asso-mamama.fr</a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/pmi_addresses.js"></script>
    <script src="js/pmi_durees.js"></script>
    <script src="js/MaMaExpress.js"></script>
</body>
</html>
