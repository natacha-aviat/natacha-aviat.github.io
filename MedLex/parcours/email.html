<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ton email · Au Clair</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/parcours.css" />
</head>
<body class="ac-page">
  <div class="ac-page">
    <header class="ac-shell-header">
      <div class="ac-shell-header__row">
        <a class="ac-logo" href="../index.html"><span class="ac-logo__dot" aria-hidden="true"></span>Au Clair</a>
        <a class="ac-back" href="../index.html">← Retour</a>
      </div>
      <div class="ac-shell-header__progress">
        <div class="ac-progress">
          <div class="ac-progress__meta"><span>Étape 1 sur 8</span><span class="ac-progress__pct">13 %</span></div>
          <div class="ac-progress__track"><div class="ac-progress__fill" style="width:13%"></div></div>
        </div>
      </div>
    </header>
    <main class="ac-main">
      <h1 class="ac-title ac-title--page">Ton email</h1>
      <p class="ac-microcopy ac-spacer-sm">On t'envoie un lien magique, pas de mot de passe à retenir.</p>
      <form class="ac-form ac-spacer-lg" action="verification-email.html" method="get">
        <label class="ac-label">
          <span>Adresse email</span>
          <input type="email" name="email" required autocomplete="email" placeholder="prenom.nom@email.com" class="ac-input" />
        </label>
        <button type="submit" class="ac-btn ac-btn--primary ac-btn--full">Continuer</button>
      </form>
      <p class="ac-microcopy--xs">Aucun email réel n'est envoyé dans cette maquette.</p>
    </main>
  </div>
</body></html>
